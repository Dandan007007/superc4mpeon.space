<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador JSON | Evolution Origin</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #05080a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .main-card {
            background: #111827;
            width: 100%;
            max-width: 550px;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h2 { color: #10b981; text-align: center; margin-top: 0; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #9ca3af; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #0b0f1a;
            border: 1px solid #374151;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #10b981;
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #34d399; }
        #jsonResult {
            margin-top: 20px;
            background: #000;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            display: none;
            border: 1px solid #10b981;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Evolution Origin JSON Gen</h2>
    
    <div class="field">
        <label>Nome do Servidor:</label>
        <input type="text" id="name" placeholder="Ex: BR-ORIGIN-01">
    </div>

    <div class="field">
        <label>IP ou Hostname:</label>
        <input type="text" id="host" placeholder="br1.robertnet.online">
    </div>

    <div class="field">
        <label>Porta:</label>
        <input type="number" id="port" value="80">
    </div>

    <div class="field">
        <label>Tipo de Conexão (Modo):</label>
        <select id="mode">
            <option value="ssh_direct">SSH Direct</option>
            <option value="ssh_ssl">SSH + SSL/TLS</option>
            <option value="v2ray_vless">V2Ray VLESS</option>
            <option value="v2ray_vmess">V2Ray VMESS</option>
        </select>
    </div>

    <div class="field">
        <label>Payload / SNI:</label>
        <textarea id="payload" rows="2" placeholder="m.facebook.com"></textarea>
    </div>

    <button onclick="gerarJSON()">GERAR CODIGO JSON</button>

    <pre id="jsonResult"></pre>
</div>

<script>
    function gerarJSON() {
        const data = {
            name: document.getElementById('name').value,
            host: document.getElementById('host').value,
            port: document.getElementById('port').value,
            mode: document.getElementById('mode').value,
            payload: document.getElementById('payload').value,
            origin: "Evolution Origin",
            timestamp: new Date().getTime()
        };

        const display = document.getElementById('jsonResult');
        display.style.display = 'block';
        display.textContent = JSON.stringify(data, null, 4);
    }
</script>

</body>
</html>
